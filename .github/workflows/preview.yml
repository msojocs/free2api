name: Preview Release

# Publishes a rolling "preview" release on every push to the main branch.

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_SERVER: ghcr.io/${{ github.repository }}/server
  IMAGE_WEB: ghcr.io/${{ github.repository }}/web

jobs:
  build-and-publish:
    name: Build & push preview images
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create/update GitHub release
      packages: write   # push to GHCR

    steps:
      - uses: actions/checkout@v4

      # ── Docker setup ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Server image ────────────────────────────────────────────────────────
      - name: Build & push server image (preview)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_SERVER }}:preview
            ${{ env.IMAGE_SERVER }}:preview-${{ github.sha }}
          cache-from: type=gha,scope=server-preview
          cache-to: type=gha,mode=max,scope=server-preview

      # ── Web image ────────────────────────────────────────────────────────────
      - name: Build & push web image (preview)
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:preview
            ${{ env.IMAGE_WEB }}:preview-${{ github.sha }}
          cache-from: type=gha,scope=web-preview
          cache-to: type=gha,mode=max,scope=web-preview

      # ── GitHub pre-release ──────────────────────────────────────────────────
      - name: Delete existing preview release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete preview --cleanup-tag --yes 2>/dev/null || true

      - name: Create preview release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create preview \
            --title "Preview (latest main)" \
            --notes "Automatically published from the latest commit on \`main\`.

          **Docker images**
          \`\`\`
          ${{ env.IMAGE_SERVER }}:preview
          ${{ env.IMAGE_WEB }}:preview
          \`\`\`

          Commit: ${{ github.sha }}" \
            --prerelease \
            --target "${{ github.sha }}"
