version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: free2api-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-16byte}
      - GIN_MODE=release
      # Uncomment the following lines to use MySQL instead of SQLite.
      # Make sure to also start the 'mysql' service below.
      #- DB_DRIVER=mysql
      #- DB_HOST=mysql
      #- DB_PORT=3306
      #- DB_NAME=${MYSQL_DATABASE:-free2api}
      #- DB_USER=${MYSQL_USER:-free2api}
      #- DB_PASSWORD=${MYSQL_PASSWORD:-free2api_pass}
    volumes:
      - server-data:/app/data
      # Mount config directory so config.yaml is available inside the container.
      - ./server/config:/app/config
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MySQL service — only needed when DB_DRIVER=mysql.
  # Comment out this service (and the depends_on above) when using SQLite.
  mysql:
    image: mysql:8.0
    container_name: free2api-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_pass}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-free2api}
      - MYSQL_USER=${MYSQL_USER:-free2api}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-free2api_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: free2api-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  server-data:
  mysql-data:
